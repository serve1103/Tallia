version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tallia
      POSTGRES_USER: tallia
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tallia1234}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tallia']
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://tallia:${DB_PASSWORD:-tallia1234}@db:5432/tallia?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      FRONTEND_ORIGIN: http://localhost:${FRONTEND_PORT:-80}
      PORT: 3000
      TRUST_PROXY: loopback
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - '${FRONTEND_PORT:-80}:80'
    depends_on:
      - backend

volumes:
  pgdata:
